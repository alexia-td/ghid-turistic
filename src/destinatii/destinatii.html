<div class="sectiune-destinatii">
  <h2>Destinații de Top</h2>
  
  <div class="grid-destinatii">
    <div class="card" *ngFor="let destinatie of listaDestinatii">
      
      <img [src]="destinatie.imagine" alt="{{ destinatie.titlu }}">
      
      <div class="card-continut">
        <h3>{{ destinatie.titlu }}</h3>
        <p>{{ destinatie.descriere }}</p>
        
        <button class="btn-detalii" [routerLink]="['/detalii', destinatie.titlu]">
          Vezi detalii
        </button>
      </div>

    </div>
  </div>
</div>
