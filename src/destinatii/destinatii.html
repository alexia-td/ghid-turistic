<div class="ghid-franta">
  <div class="header-sectiune">
    <h2>Explorează Franța</h2>
    <p>Descoperă eleganța orașelor franceze, de la luminile Parisului la soarele de pe Coasta de Azur.</p>
  </div>

  <div class="grid-destinatii">
    <div class="card-oras" *ngFor="let oras of listaDestinatii">
      
      <div class="container-imagine">
        <img [src]="oras.imagine" [alt]="oras.titlu">
        <div class="badge-categorie">Destinație Top</div>
      </div>

      <div class="card-corp">
        <h3>{{ oras.titlu }}</h3>
        <p>{{ oras.descriere }}</p>
        
        <div class="card-actiuni">
          <button class="btn-exploreaza" [routerLink]="['/oras', oras.id]">
            Vizitează {{ oras.titlu }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
